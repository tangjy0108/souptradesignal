<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>QuantView</title>

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#2962FF" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="QuantView" />
    <link rel="apple-touch-icon" href="/icon-192.png" />

    <!-- Safe area for notch phones -->
    <style>
      body { margin: 0; background: #0B0E14; }
    </style>
    <script>
      (function () {
        if (!('serviceWorker' in navigator)) return;

        const params = new URLSearchParams(window.location.search);
        if (!params.has('reset-sw')) return;

        window.__qvSwResetting = true;
        window.addEventListener('load', async () => {
          try {
            const regs = await navigator.serviceWorker.getRegistrations();
            await Promise.all(regs.map(reg => reg.unregister()));
            if ('caches' in window) {
              const keys = await caches.keys();
              await Promise.all(keys.map(key => caches.delete(key)));
            }
          } catch (err) {
            console.warn('Service worker reset failed:', err);
          } finally {
            const nextUrl = new URL(window.location.href);
            nextUrl.searchParams.delete('reset-sw');
            window.location.replace(nextUrl.toString());
          }
        });
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script>
      if ('serviceWorker' in navigator && !window.__qvSwResetting) {
        let refreshing = false;
        navigator.serviceWorker.addEventListener('controllerchange', () => {
          if (refreshing) return;
          refreshing = true;
          window.location.reload();
        });

        window.addEventListener('load', async () => {
          try {
            const registration = await navigator.serviceWorker.register('/sw.js', { updateViaCache: 'none' });
            if (registration.waiting) {
              registration.waiting.postMessage({ type: 'SKIP_WAITING' });
            }
            registration.addEventListener('updatefound', () => {
              const worker = registration.installing;
              if (!worker) return;
              worker.addEventListener('statechange', () => {
                if (worker.state === 'installed' && navigator.serviceWorker.controller) {
                  worker.postMessage({ type: 'SKIP_WAITING' });
                }
              });
            });
          } catch (err) {
            console.warn('Service worker registration failed:', err);
          }
        });
      }
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
